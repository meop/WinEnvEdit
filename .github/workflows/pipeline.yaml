---
name: Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      new_version: ${{ steps.check.outputs.version }}
      prerelease: ${{ steps.check.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for version tag
        id: check
        shell: bash
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "Target version: $VERSION"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists. Skipping release steps."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag v$VERSION does not exist. Triggering release pipeline."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            # A semver prerelease suffix (e.g. 1.1.0-rc.1) marks the GitHub release prerelease.
            if [[ "$VERSION" == *-* ]]; then
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  validate:
    name: Validate
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Run Prebuild script and check
        shell: pwsh
        run: |
          ./scripts/Prebuild.ps1
          $status = git status --porcelain
          if ($status) {
            Write-Host 'Error: Please run ./scripts/Prebuild.ps1 locally and commit the changes.' -ForegroundColor Red
            Write-Host $status
            exit 1
          }
      - name: Run Tests
        run: dotnet test WinEnvEdit.Tests/WinEnvEdit.Tests.csproj -c Debug
          -p:Platform=x64 --verbosity normal

  publish:
    name: Publish
    needs: [ version, validate ]
    if: github.ref == 'refs/heads/main' && needs.version.outputs.changed == 'true'
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [ ARM64, x64 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Run Publish script and check
        shell: pwsh
        run: |
          ./scripts/Publish.ps1 -Platform ${{ matrix.platform }}
          $status = git status --porcelain
          if ($status) {
            Write-Host 'Error: Uncommitted changes detected after running Publish.ps1.' -ForegroundColor Red
            Write-Host $status
            exit 1
          }
      - name: Stage MSI + portable zip
        shell: pwsh
        run: |
          $platform = "${{ matrix.platform }}"
          $rid = if ($platform -eq 'ARM64') { 'win-arm64' } else { 'win-x64' }
          $publishDir = "WinEnvEdit/bin/$platform/Release/net10.0-windows10.0.26100.0/$rid/publish"
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item "WinEnvEdit.Installer/bin/$platform/Release/WinEnvEdit-$platform.msi" staging/
          # Portable: zip the whole self-contained publish folder (the exe needs its sibling files).
          Compress-Archive -Path "$publishDir/*" -DestinationPath "staging/WinEnvEdit-$platform-portable.zip" -Force
      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: WinEnvEdit-${{ matrix.platform }}
          path: staging/*

  release:
    name: Release
    needs: [ version, publish ]
    if: github.ref == 'refs/heads/main' && needs.version.outputs.changed == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download Artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./artifacts
      - name: Normalize release file names (lowercase platform)
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.msi' -o -name '*.zip' \) | while read -r f; do
            cp "$f" "release/$(basename "${f//ARM64/arm64}")"
          done
          ls -la release
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_tag_gpgsign: true
      - name: Create signed tag
        run: |
          git tag -s v${{ needs.version.outputs.new_version }} -m "Release v${{ needs.version.outputs.new_version }}"
          git push origin v${{ needs.version.outputs.new_version }}
      - name: Build Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          commitMode: true
          configuration: |
            {
              "commit_template": "- #{{SUMMARY}} ([#{{SHA}}](https://github.com/${{github.repository}}/commit/#{{SHA}}))"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.version.outputs.new_version }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            release/*
            LICENSE.txt
          draft: false
          prerelease: ${{ needs.version.outputs.prerelease }}

  package:
    name: Package
    needs: [ version, release ]
    if: github.ref == 'refs/heads/main' && needs.version.outputs.changed == 'true' && needs.version.outputs.prerelease == 'false'
    runs-on: windows-latest
    steps:
      - name: Submit WinGet update
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.new_version }}"
          $baseUrl = "https://github.com/${{ github.repository }}/releases/download/v$version"
          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          .\wingetcreate.exe update meop.WinEnvEdit `
            --version $version `
            --urls "$baseUrl/WinEnvEdit-x64.msi" "$baseUrl/WinEnvEdit-arm64.msi" `
            --token ${{ secrets.PAT_REPO }} `
            --submit
